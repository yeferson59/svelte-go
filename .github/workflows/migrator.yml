name: Migrator

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"

      - run: go mod download
        working-directory: backend

      - run: go run backend/internal/migrator/main.go
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PATH_MIGRATION: "file://backend/internal/migrations"
