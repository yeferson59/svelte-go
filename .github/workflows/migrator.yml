name: Migrator

on:
  push:
    branches: [main]
    paths:
      - backend/**
  pull_request:
    branches: [main]
    paths:
      - backend/**

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"
          go-version-file: "backend/go.mod"
          cache-dependency-path: "backend/go.sum"

      - run: go mod download
        working-directory: backend

      - run: go run internal/migrator/main.go
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PATH_MIGRATION: "file://internal/migrations"
